<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="grad_bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD7F32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5E3C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#1a1a2e" rx="20"/>

  <!-- Hat Body (bucket hat shape) -->
  <ellipse cx="150" cy="180" rx="90" ry="30" fill="url(#grad_bronze)" />

  <!-- Hat Top -->
  <ellipse cx="150" cy="100" rx="70" ry="50" fill="url(#grad_bronze)" />

  <!-- Hat Brim -->
  <rect x="60" y="175" width="180" height="12" rx="6" fill="url(#grad_bronze)" />

  <!-- Hat Band -->
  <rect x="80" y="130" width="140" height="10" rx="3" fill="#8B5E3C" opacity="0.8" />

  <!-- Stars (rarity indicator) -->
  <text x="120" y="70" font-size="20" text-anchor="middle">★</text>

  <!-- Tier Label -->
  <text x="150" y="240" font-size="22" font-family="Arial, sans-serif"
        font-weight="bold" fill="#CD7F32" text-anchor="middle">
    Bronze GreenHat
  </text>

  <!-- GREEN Badge -->
  <text x="150" y="265" font-size="12" font-family="Arial, sans-serif"
        fill="#4CAF50" text-anchor="middle">
    🌿 GREEN
  </text>
</svg>