[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = ["openzeppelin-contracts/=lib/openzeppelin-contracts/"]
optimizer = false
via_ir = false

[profile.ci]
# CI: matches production behavior for reliable gas snapshots
solc = "0.8.20"
optimizer = true
optimizer_runs = 10_000

[profile.production]
# Production: full optimization for minimal gas cost
solc = "0.8.20"
optimizer = true
optimizer_runs = 10_000
via_ir = false
# ── For deeper optimization (slower compile) ──
# via_ir = true
# evm_version = "cancun"  # requires Solc ≥0.8.24 & Dencun-upgraded chain

[etherscan]
# ── Explorer API keys (set in .env or GitHub Secrets) ──
ethereum = { key = "${ETHERSCAN_API_KEY}" }
bnb_smart_chain = { key = "${BSC_SCAN_API_KEY}" }
base = { key = "${BASE_SCAN_API_KEY}" }
polygon = { key = "${POLYGON_SCAN_API_KEY}" }
optimism = { key = "${OPTIMISM_SCAN_API_KEY}" }
arbitrum_one = { key = "${ARBITRUM_SCAN_API_KEY}" }

[fmt]
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
number_underscore = "preserve"
quote_style = "double"
sort_imports = true
tab_width = 4
